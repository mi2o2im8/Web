<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>table style</title>

        <!-- 내부 스타일 시트 -->
        <style>
            table{
                width: 300px;
                border: 2px solid black;
                /* 내부실선이 2줄로 그려지는 것이 싫다면.. 두 선을 합치기 */
                border-collapse: collapse;
                /* 안에 있는 모든 것들의 수평정렬을 가운데로.. */
                text-align: center;
                
            }

            th, td{border: 1px solid rgb(255, 173, 49); padding: 10px 5px;} /*위아래 여백 10px 좌우여백 5px*/

            /* 제목줄 칸들에 배경색 지정 */
            th{ background-color: rgb(132, 109, 235); color: white;}

            /* 짝수줄 만 별도의 배경색 지정 */
            tr:nth-child(2n){background-color: rgb(232, 255, 130);}

            /* 첫번재 칸들의 너비를 지정 */
            td:first-child{width: 40%;}

            /* 제목줄의 아래 경계선을 적색으로.. */
            th{border-bottom: 2px double rgb(255, 134, 134);}

            /* 직접 만들지는 않았지만...그래서 보이지는 않지만... 실제 table안에 존재하는 자식요소 tobody 확인! */
            table>:nth-child(1){border: 10px solid salmon;}

            /* 그래서 보통 테이블 작업할때는 자식선택자를 잘 사용하지 대신 자손선택자를 권장함 */
            table>tr{color: red} /*대상이 없음*/
            table tr{color: pink;} /*자손을 하고 싶다면 띄어쓰기하기*/
            /* 부모에게 핑크주면 다 핑크가 되고 제목줄은 따로 지정해야함. */
            table th{color: aqua;}
            /* 책. chapter6 ~ chapter7 까지 모두 완료. */
            /* 수행과제 */
            /* 1. 책 p.168~p.238p 읽고 예제 모두 따라 써보기.. */
            /* 2. 각 챕터의 되새김 문제..를 풀어보기.. */

        </style>

    </head>
    <body>
        
        <table>
            <tr>
                <th>이름</th>
                <th>이메일</th>
            </tr>
            <tr>
                <td>김철수</td>
                <td>aa@gmail.com</td>
            </tr>
            <tr>
                <td>김나나</td>
                <td>bb@gmail.com</td>
            </tr>
            <tr>
                <td>김나미</td>
                <td>cc@gmail.com</td>
            </tr>
            <tr>
                <td>이루민</td>
                <td>dd@gmail.com</td>
            </tr>
            
            
        </table>

    </body>
</html>
