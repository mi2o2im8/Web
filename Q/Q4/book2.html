<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>지원페이지</title>
    </head>
    <body>
        <header>
            <h4>완성 화면</h4>
            <hr>
            <h2>프런트엔드 개발자 지원서</h2>
            <p>HTML, CSS, 자바스크립트의 기술을 이해하고 실무 경험이 있는 분을 찾습니다.</p>
        </header>
        <hr>
        <h4>개인 정보</h4>
            <ul>
                <li>
                    <label for="x-name">이름</label>
                    <input type="name" id="x-name">
                </li>
                <li>
                    <label for="x-number" >연락처</label>
                    <input type="number" id="x-number">
                </li>
            </ul>

        <h4>지원 분야</h4>
            <form>
                <label><input type="radio" name="job">웹 퍼블리싱</label><br>
                <label><input type="radio" name="job">웹 애플리케이션 개발</label><br>
                <label><input type="radio" name="job">개발 환경 개선</label><br>
            </form>
        
        <h4>지원 동기</h4>
            <textarea name="message" rows="5" cols="60">본사 지원 동기를 간략히 써 주세요.</textarea>
        <br>
        
        <button>접수하기</button>
        <button>다시 쓰기</button>

        
    </body>
</html>
